<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文王六十四卦</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Ma+Shan+Zheng&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #080d0a;
    color: #e0d8c8;
    font-family: 'Noto Serif SC', serif;
    overflow-x: hidden;
  }

  .bg-layer {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(ellipse at 50% 25%, #1a2a1e 0%, #080d0a 70%);
    z-index: 0;
  }

  /* 铜绿粒子 */
  .particle-container {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 1; overflow: hidden;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0% { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
    15% { opacity: 0.6; }
    70% { opacity: 0.2; }
    100% { transform: translateY(-100vh) translateX(30px) scale(1.5); opacity: 0; }
  }

  .container {
    position: relative; z-index: 2;
    max-width: 600px; margin: 0 auto; padding: 20px;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
  }

  /* 导航 */
  .nav-link-l {
    position: fixed; top: 16px; left: 16px;
    color: #6a9a7a; font-size: 0.85rem;
    text-decoration: none; letter-spacing: 2px;
    z-index: 10; transition: color 0.3s;
  }
  .nav-link-l:hover { color: #c8a84e; }
  .nav-link-l2 {
    position: fixed; top: 38px; left: 16px;
    color: #6a9a7a; font-size: 0.85rem;
    text-decoration: none; letter-spacing: 2px;
    z-index: 10; transition: color 0.3s;
  }
  .nav-link-l2:hover { color: #c8a84e; }
  .nav-link-r {
    position: fixed; top: 16px; right: 16px;
    color: #6a9a7a; font-size: 0.85rem;
    text-decoration: none; letter-spacing: 2px;
    z-index: 10; transition: color 0.3s;
  }
  .nav-link-r:hover { color: #c8a84e; }

  /* 标题 */
  .header { text-align: center; margin-top: 30px; margin-bottom: 10px; }
  .header h1 {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 2.8rem;
    color: #c8a84e;
    text-shadow: 0 0 20px rgba(200,168,78,0.4), 0 0 50px rgba(74,154,122,0.15), 0 2px 4px rgba(0,0,0,0.6);
    letter-spacing: 10px;
  }
  .header p {
    font-size: 0.95rem; color: #6a9a7a; margin-top: 8px;
    letter-spacing: 4px;
  }
  .header .sub {
    font-size: 0.8rem; color: #4a7a5a; margin-top: 4px;
    letter-spacing: 2px;
  }

  /* 铜钱区域 */
  .coin-area {
    display: flex; flex-direction: column; align-items: center;
    margin-top: 24px; width: 100%;
  }

  .coins-row {
    display: flex; gap: 20px; justify-content: center;
    margin-bottom: 16px;
    perspective: 600px;
  }

  .coin {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #d4b44e, #a08030, #c8a84e, #8a6a20);
    border: 3px solid #c8a84e;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,215,0,0.15);
    position: relative;
    transition: transform 0.2s;
  }
  .coin-hole {
    width: 20px; height: 20px;
    background: #080d0a;
    border: 2px solid #a08030;
  }
  .coin-text {
    position: absolute;
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 0.7rem;
    color: #080d0a;
    font-weight: 700;
  }
  .coin-text.top { top: 10px; }
  .coin-text.bottom { bottom: 10px; }
  .coin-text.left { left: 10px; }
  .coin-text.right { right: 10px; }

  .coin.flipping {
    animation: coinFlip 0.6s ease-in-out;
  }
  @keyframes coinFlip {
    0% { transform: rotateX(0deg); }
    50% { transform: rotateX(900deg) scale(1.1); }
    100% { transform: rotateX(1800deg); }
  }

  .coin.result-yang {
    background: radial-gradient(circle at 40% 35%, #d4b44e, #a08030, #c8a84e, #8a6a20);
  }
  .coin.result-yin {
    background: radial-gradient(circle at 40% 35%, #8a7040, #6a5030, #7a6035, #5a4020);
    border-color: #8a7040;
  }

  .progress {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 1.2rem;
    color: #c8a84e;
    margin-bottom: 8px;
    letter-spacing: 3px;
    min-height: 1.5em;
  }

  /* 卦象构建区 */
  .hexagram-build {
    display: flex; flex-direction: column-reverse;
    align-items: center; gap: 8px;
    margin: 16px 0;
    min-height: 140px;
  }
  .yao-line {
    display: flex; align-items: center; gap: 8px;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .yao-line.visible { opacity: 1; }
  .yao-label {
    font-size: 0.75rem; color: #6a9a7a; width: 36px; text-align: right;
  }
  .yao-bar {
    height: 6px; background: #c8a84e; border-radius: 3px;
  }
  .yao-bar.yang { width: 100px; }
  .yao-bar.yin { width: 42px; }
  .yao-gap { width: 12px; }
  .yao-label-r {
    font-size: 0.7rem; color: #4a7a5a; width: 36px;
  }

  .hint {
    font-size: 0.9rem; color: #6a9a7a; margin-bottom: 20px;
    letter-spacing: 2px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  .btn {
    background: linear-gradient(135deg, #2a4a30, #4a9a7a, #2a4a30);
    color: #e0d8c8; border: 1px solid rgba(200,168,78,0.4);
    padding: 14px 48px;
    font-family: 'Noto Serif SC', serif;
    font-size: 1.15rem; font-weight: 700;
    border-radius: 50px; cursor: pointer;
    letter-spacing: 6px;
    box-shadow: 0 4px 20px rgba(74,154,122,0.2);
    transition: all 0.3s;
    margin-top: 10px;
  }
  .btn:hover {
    box-shadow: 0 6px 30px rgba(74,154,122,0.4);
    transform: translateY(-2px);
  }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* 闪光 */
  .flash {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle, rgba(200,168,78,0.3), transparent 70%);
    z-index: 5; pointer-events: none;
    opacity: 0; animation: flashOnce 0.6s ease-out forwards;
  }
  @keyframes flashOnce {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* 结果区 */
  .result {
    width: 100%; max-width: 540px;
    margin-top: 30px;
    opacity: 0; transform: translateY(30px);
    transition: all 0.8s ease;
    display: none;
  }
  .result.show { display: block; opacity: 1; transform: translateY(0); }

  .result-card {
    background: linear-gradient(135deg, #0e1a10, #162818, #0e1a10);
    border: 2px solid rgba(200,168,78,0.3);
    border-radius: 16px;
    padding: 30px 24px;
    position: relative; overflow: hidden;
  }
  .result-card::before {
    content: '';
    position: absolute; top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle at 50% 50%, rgba(74,154,122,0.03), transparent 60%);
  }

  .result-header {
    text-align: center; margin-bottom: 16px;
  }
  .result-symbol {
    font-size: 3.5rem;
    color: #c8a84e;
    text-shadow: 0 0 20px rgba(200,168,78,0.4);
  }
  .result-name {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 1.8rem;
    color: #c8a84e;
    letter-spacing: 6px;
    margin-top: 4px;
  }
  .result-sub {
    font-size: 0.85rem;
    color: #6a9a7a;
    letter-spacing: 2px;
    margin-top: 4px;
  }

  /* 六爻图 */
  .hexagram-display {
    display: flex; flex-direction: column-reverse;
    align-items: center; gap: 6px;
    margin: 16px 0;
  }
  .hex-yao {
    display: flex; align-items: center; gap: 6px;
  }
  .hex-label { font-size: 0.7rem; color: #4a7a5a; width: 30px; text-align: right; }
  .hex-bar {
    height: 5px; background: #c8a84e; border-radius: 2px;
  }
  .hex-bar.yang { width: 80px; }
  .hex-bar.yin { width: 34px; }
  .hex-gap { width: 10px; }

  .divider {
    width: 60%; height: 1px; margin: 16px auto;
    background: linear-gradient(90deg, transparent, rgba(200,168,78,0.3), transparent);
  }

  .interpretation {
    background: rgba(0,0,0,0.3);
    border-radius: 10px;
    padding: 16px 18px; margin-top: 12px;
  }
  .interpretation h3 {
    color: #4a9a7a; font-size: 1rem;
    margin-bottom: 8px; letter-spacing: 4px;
  }
  .interpretation p {
    font-size: 0.92rem; line-height: 1.9; color: #a0b8a0;
  }

  .yao-ci-list {
    list-style: none; padding: 0;
  }
  .yao-ci-list li {
    font-size: 0.88rem; line-height: 1.8; color: #a0b8a0;
    padding: 4px 0;
    border-bottom: 1px solid rgba(74,154,122,0.1);
  }
  .yao-ci-list li:last-child { border-bottom: none; }
  .yao-ci-list li span {
    color: #c8a84e; font-weight: 700; margin-right: 8px;
  }

  .detail-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px 16px; margin-top: 12px;
  }
  .detail-item { font-size: 0.85rem; color: #4a7a5a; }
  .detail-item span { color: #a0b8a0; }

  .btn-again {
    display: block; margin: 24px auto 40px;
    background: transparent;
    border: 1.5px solid rgba(200,168,78,0.3);
    color: #c8a84e;
    padding: 10px 36px;
    font-family: 'Noto Serif SC', serif;
    font-size: 0.95rem;
    border-radius: 50px; cursor: pointer;
    letter-spacing: 4px; transition: all 0.3s;
  }
  .btn-again:hover { background: rgba(74,154,122,0.08); }

  @media (max-width: 480px) {
    .header h1 { font-size: 2.2rem; letter-spacing: 6px; }
    .coin { width: 64px; height: 64px; }
    .coin-hole { width: 16px; height: 16px; }
    .coin-text { font-size: 0.6rem; }
    .coin-text.top { top: 6px; }
    .coin-text.bottom { bottom: 6px; }
    .coin-text.left { left: 6px; }
    .coin-text.right { right: 6px; }
    .result-card { padding: 24px 16px; }
    .result-symbol { font-size: 2.8rem; }
  }
</style>
</head>

<div class="container">
  <div class="header">
    <h1>文王六十四卦</h1>
    <p>周易占卜 · 天人合一</p>
    <div class="sub">诚心摇卦 · 问道天机</div>
  </div>

  <div class="coin-area" id="coinArea">
    <div class="progress" id="progress"></div>
    <div class="coins-row" id="coinsRow">
      <div class="coin" id="coin0">
        <div class="coin-hole"></div>
        <span class="coin-text top">乾</span>
        <span class="coin-text bottom">坤</span>
        <span class="coin-text left">元</span>
        <span class="coin-text right">亨</span>
      </div>
      <div class="coin" id="coin1">
        <div class="coin-hole"></div>
        <span class="coin-text top">乾</span>
        <span class="coin-text bottom">坤</span>
        <span class="coin-text left">元</span>
        <span class="coin-text right">亨</span>
      </div>
      <div class="coin" id="coin2">
        <div class="coin-hole"></div>
        <span class="coin-text top">乾</span>
        <span class="coin-text bottom">坤</span>
        <span class="coin-text left">元</span>
        <span class="coin-text right">亨</span>
      </div>
    </div>

    <div class="hexagram-build" id="hexagramBuild">
      <div class="yao-line" id="yao0"><span class="yao-label">初爻</span><span class="yao-bar yang" id="yaoBar0"></span><span class="yao-label-r" id="yaoType0"></span></div>
      <div class="yao-line" id="yao1"><span class="yao-label">二爻</span><span class="yao-bar yang" id="yaoBar1"></span><span class="yao-label-r" id="yaoType1"></span></div>
      <div class="yao-line" id="yao2"><span class="yao-label">三爻</span><span class="yao-bar yang" id="yaoBar2"></span><span class="yao-label-r" id="yaoType2"></span></div>
      <div class="yao-line" id="yao3"><span class="yao-label">四爻</span><span class="yao-bar yang" id="yaoBar3"></span><span class="yao-label-r" id="yaoType3"></span></div>
      <div class="yao-line" id="yao4"><span class="yao-label">五爻</span><span class="yao-bar yang" id="yaoBar4"></span><span class="yao-label-r" id="yaoType4"></span></div>
      <div class="yao-line" id="yao5"><span class="yao-label">上爻</span><span class="yao-bar yang" id="yaoBar5"></span><span class="yao-label-r" id="yaoType5"></span></div>
    </div>

    <p class="hint" id="hint">点击铜钱 · 诚心摇卦</p>
    <button class="btn" onclick="throwCoins()" id="throwBtn">摇 卦</button>
  </div>

  <div class="result" id="result"></div>
</div>

<script>
// 铜绿粒子
const pCtn = document.getElementById('particleContainer');
for (let i = 0; i < 18; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  const colors = [
    'radial-gradient(circle, rgba(74,154,122,0.5), transparent)',
    'radial-gradient(circle, rgba(200,168,78,0.4), transparent)',
    'radial-gradient(circle, rgba(100,180,140,0.3), transparent)'
  ];
  p.style.cssText = `
    left: ${Math.random() * 100}%;
    bottom: ${Math.random() * 20}%;
    width: ${3 + Math.random() * 5}px;
    height: ${3 + Math.random() * 5}px;
    background: ${colors[i % 3]};
    animation-duration: ${7 + Math.random() * 9}s;
    animation-delay: ${Math.random() * 7}s;
  `;
  pCtn.appendChild(p);
}

// ====== 卦象数据 ======
const guas = [
  {num:1, name:"乾", fullName:"乾为天", upper:"乾", lower:"乾", symbol:"䷀",
    guaCi:"元亨利贞。",
    tuanYue:"大哉乾元，万物资始，乃统天。六爻发挥，旁通情也，时乘六龙以御天。",
    xiangYue:"天行健，君子以自强不息。潜龙勿用，阳在下也；见龙在田，德施普也。",
    baihua:"天道刚健运行不息，象征纯阳之德。君子应效法天道，奋发自强，永不停歇。",
    yaoCi:['初九：潜龙勿用。','九二：见龙在田，利见大人。','九三：君子终日乾乾，夕惕若厉，无咎。','九四：或跃在渊，无咎。','九五：飞龙在天，利见大人。','上九：亢龙有悔。'],
    fortune:{cai:'积极进取，财运旺盛',hun:'阳刚太盛，宜谦和',ye:'大展宏图，事业昌',jian:'精力充沛，保持节制',xing:'一帆风顺，宜出行',song:'理直气壮，可胜诉'}},
  {num:2, name:"坤", fullName:"坤为地", upper:"坤", lower:"坤", symbol:"䷁",
    guaCi:"元亨，利牝马之贞。君子有攸往，先迷后得主，利。西南得朋，东北丧朋，安贞吉。",
    tuanYue:"至哉坤元，万物资生，乃顺承天。坤厚载物，德合无疆，含弘光大，品物咸亨。",
    xiangYue:"地势坤，君子以厚德载物。六二直方大，不习无不利，地道光也。",
    baihua:"大地厚德无私，顺承天道滋养万物。君子应效法大地，以宽厚之德包容万物。",
    yaoCi:['初六：履霜，坚冰至。','六二：直方大，不习无不利。','六三：含章可贞，或从王事，无成有终。','六四：括囊，无咎无誉。','六五：黄裳，元吉。','上六：龙战于野，其血玄黄。'],
    fortune:{cai:'厚积薄发，稳健求财',hun:'柔顺相处，婚姻美满',ye:'甘居辅佐，徐图大成',jian:'调养为主，勿过劳累',xing:'随行顺势，平稳吉利',song:'以和为贵，忍让为上'}},
  {num:3, name:"屯", fullName:"水雷屯", upper:"坎", lower:"震", symbol:"䷂",
    guaCi:"元亨利贞，勿用有攸往，利建侯。",
    tuanYue:"屯，刚柔始交而难生。动乎险中，大亨贞，雷雨之动满盈，天造草昧，宜建侯而不宁。",
    xiangYue:"云雷屯，君子以经纶。初九虽磐桓，志行正也；六二之难，乘刚也。",
    baihua:"草木初萌，破土艰难，象征万事开头难。创业初期困难重重，宜广结贤才，稳扎稳打。",
    yaoCi:['初九：磐桓，利居贞，利建侯。','六二：屯如邅如，乘马班如，匪寇婚媾，女子贞不字，十年乃字。','六三：即鹿无虞，惟入于林中，君子几不如舍，往吝。','六四：乘马班如，求婚媾，往吉，无不利。','九五：屯其膏，小贞吉，大贞凶。','上六：乘马班如，泣血涟如。'],
    fortune:{cai:'创业艰难，量力而行',hun:'历经波折，终成眷属',ye:'初创维艰，坚持不懈',jian:'注意休养，防范寒湿',xing:'道路不顺，暂缓出行',song:'纷争初起，难以速决'}},
  {num:4, name:"蒙", fullName:"山水蒙", upper:"艮", lower:"坎", symbol:"䷃",
    guaCi:"亨。匪我求童蒙，童蒙求我，初筮告，再三渎，渎则不告，利贞。",
    tuanYue:"蒙，山下有险，险而止，蒙。蒙亨，以亨行时中也。匪我求童蒙，童蒙求我，志应也。",
    xiangYue:"山下出泉，蒙。君子以果行育德。初六发蒙，以正法也；九二包蒙吉，纳妇吉，子克家。",
    baihua:"山下有泉水涌出，蒙昧待启。象征启蒙教育之道，须学生主动求教，师者因材施教。",
    yaoCi:['初六：发蒙，利用刑人，用说桎梏，以往吝。','九二：包蒙吉，纳妇吉，子克家。','六三：勿用取女，见金夫，不有躬，无攸利。','六四：困蒙，吝。','六五：童蒙，吉。','上九：击蒙，不利为寇，利御寇。'],
    fortune:{cai:'求教明师，稳步获财',hun:'年少结缘，宜慎重择偶',ye:'虚心求学，循序渐进',jian:'防治未病，养成好习惯',xing:'初涉远行，需有向导',song:'明辨是非，防被蒙蔽'}},
  {num:5, name:"需", fullName:"水天需", upper:"坎", lower:"乾", symbol:"䷄",
    guaCi:"有孚，光亨，贞吉，利涉大川。",
    tuanYue:"需，须也，险在前也。刚健而不陷，其义不困穷矣。需有孚，光亨贞吉，位乎天位，以正中也。",
    xiangYue:"云上于天，需。君子以饮食宴乐。需于郊，不犯难行也；需于沙，衍在中也，虽有小言，以吉终也。",
    baihua:"乌云聚于天上，雨尚未降，需要等待时机。告诫人们遇事须耐心等待，切勿急进冒险。",
    yaoCi:['初九：需于郊，利用恒，无咎。','九二：需于沙，小有言，终吉。','九三：需于泥，致寇至。','六四：需于血，出自穴。','九五：需于酒食，贞吉。','上六：入于穴，有不速之客三人来，敬之终吉。'],
    fortune:{cai:'时机未到，耐心等待',hun:'缘分将至，静待良缘',ye:'蓄势待发，时机一到必成',jian:'休养生息，勿急于求成',xing:'暂缓出行，等待时机',song:'拖延战术，以静制动'}},
  {num:6, name:"讼", fullName:"天水讼", upper:"乾", lower:"坎", symbol:"䷅",
    guaCi:"有孚，窒惕，中吉，终凶。利见大人，不利涉大川。",
    tuanYue:"讼，上刚下险，险而健，讼。讼有孚窒，惕中吉，刚来而得中也。终凶，讼不可成也。",
    xiangYue:"天与水违行，讼。君子以作事谋始。不永所事，讼不可长也；虽小有言，其辩明也。",
    baihua:"天道向上、水性向下，相互乖违，象征争讼。劝人凡事防患于未然，争讼伤财损气宜避免。",
    yaoCi:['初六：不永所事，小有言，终吉。','九二：不克讼，归而逋，其邑人三百户，无眚。','六三：食旧德，贞厉，终吉，或从王事，无成。','九四：不克讼，复即命，渝安贞，吉。','九五：讼，元吉。','上九：或锡之鞶带，终朝三褫之。'],
    fortune:{cai:'争财惹祸，和气生财',hun:'口舌是非，感情受损',ye:'有争竞之象，宜协商',jian:'心情郁结，防肝胆疾',xing:'出行多阻，慎防纠纷',song:'官司缠身，胜负难料'}},
  {num:7, name:"师", fullName:"地水师", upper:"坤", lower:"坎", symbol:"䷆",
    guaCi:"贞，丈人吉，无咎。",
    tuanYue:"师，众也，贞正也。能以众正，可以王矣。刚中而应，行险而顺，以此毒天下，而民从之，吉又何咎矣。",
    xiangYue:"地中有水，师。君子以容民畜众。师出以律，失律凶也；在师中吉，承天宠也，王三锡命，怀万邦也。",
    baihua:"地中藏水，如军队潜伏。象征统帅军队须纪律严明，以德服众方能取胜。",
    yaoCi:['初六：师出以律，否臧凶。','九二：在师中，吉无咎，王三锡命。','六三：师或舆尸，凶。','六四：师左次，无咎。','六五：田有禽，利执言，无咎，长子帅师，弟子舆尸，贞凶。','上六：大君有命，开国承家，小人勿用。'],
    fortune:{cai:'团结众力，稳步求财',hun:'主动追求，择贤而嫁娶',ye:'统筹全局，善用人才',jian:'劳累过度，注意休息',xing:'集体出行，统一部署',song:'师出有名，依法维权'}},
  {num:8, name:"比", fullName:"水地比", upper:"坎", lower:"坤", symbol:"䷇",
    guaCi:"吉，原筮元永贞，无咎。不宁方来，后夫凶。",
    tuanYue:"比，吉也，比辅也，下顺从也。原筮元永贞无咎，以刚中也。不宁方来，上下应也。后夫凶，其道穷也。",
    xiangYue:"地上有水，比。先王以建万国，亲诸侯。比之自内，不自失也；比之匪人，不亦伤乎。",
    baihua:"地上有水，水与地亲密相附，象征亲比团结。人际之间应相互亲近扶持，广结善缘。",
    yaoCi:['初六：有孚比之，无咎，有孚盈缶，终来有他，吉。','六二：比之自内，贞吉。','六三：比之匪人。','六四：外比之，贞吉。','九五：显比，王用三驱，失前禽，邑人不诫，吉。','上六：比之无首，凶。'],
    fortune:{cai:'广结人脉，合作获财',hun:'情投意合，比翼双飞',ye:'团结协作，众志成城',jian:'身心调和，亲近自然',xing:'结伴同行，互助吉利',song:'联合众人，以众胜寡'}},
  {num:9, name:"小畜", fullName:"风天小畜", upper:"巽", lower:"乾", symbol:"䷈",
    guaCi:"亨，密云不雨，自我西郊。",
    tuanYue:"小畜，柔得位而上下应之，曰小畜。健而巽，刚中而志行，乃亨。密云不雨，尚往也。",
    xiangYue:"风行天上，小畜。君子以懿文德。",
    baihua:"风行天上，云气聚而未雨，象征力量尚小，积蓄不足。宜先修养文德，待时而动。",
    yaoCi:['初九：复自道，何其咎，吉。','九二：牵复，吉。','九三：舆说辐，夫妻反目。','六四：有孚，血去惕出，无咎。','九五：有孚挛如，富以其邻。','上九：既雨既处，尚德载，妇贞厉，月几望，君子征凶。'],
    fortune:{cai:'小有积蓄，不宜大投',hun:'暂有小阻，终将圆满',ye:'蓄势待发，循序渐进',jian:'小恙注意，及时调养',xing:'短途可行，远行暂缓',song:'小事化了，不宜纠缠'}},
  {num:10, name:"履", fullName:"天泽履", upper:"乾", lower:"兑", symbol:"䷉",
    guaCi:"履虎尾，不咥人，亨。",
    tuanYue:"履，柔履刚也。说而应乎乾，是以履虎尾不咥人，亨。刚中正，履帝位而不疚，光明也。",
    xiangYue:"上天下泽，履。君子以辨上下，定民志。",
    baihua:"踩到老虎尾巴却不被咬，象征行事谨慎、以礼待人则可化险为夷。",
    yaoCi:['初九：素履往，无咎。','九二：履道坦坦，幽人贞吉。','六三：眇能视，跛能履，履虎尾咥人，凶。','九四：履虎尾，愬愬终吉。','九五：夬履，贞厉。','上九：视履考祥，其旋元吉。'],
    fortune:{cai:'谨慎理财，稳中求利',hun:'以礼相待，和睦可期',ye:'谨言慎行，步步为营',jian:'小心行走，防跌伤',xing:'谨慎出行，注意安全',song:'以礼服人，不宜强争'}},
  {num:11, name:"泰", fullName:"地天泰", upper:"坤", lower:"乾", symbol:"䷊",
    guaCi:"小往大来，吉亨。",
    tuanYue:"泰，小往大来吉亨，则是天地交而万物通也，上下交而其志同也。",
    xiangYue:"天地交，泰。后以财成天地之道，辅相天地之宜，以左右民。",
    baihua:"天地之气相交融通，万物生长繁茂，象征国泰民安、万事亨通之象。",
    yaoCi:['初九：拔茅茹以其汇，征吉。','九二：包荒，用冯河，不遐遗，朋亡，得尚于中行。','九三：无平不陂，无往不复，艰贞无咎，勿恤其孚，于食有福。','六四：翩翩不富以其邻，不戒以孚。','六五：帝乙归妹，以祉元吉。','上六：城复于隍，勿用师，自邑告命，贞吝。'],
    fortune:{cai:'财运亨通，大利求财',hun:'天作之合，美满幸福',ye:'万事顺遂，大展宏图',jian:'身体康泰，精力充沛',xing:'出入平安，四通八达',song:'和解为上，吉利收场'}},
  {num:12, name:"否", fullName:"天地否", upper:"乾", lower:"坤", symbol:"䷋",
    guaCi:"否之匪人，不利君子贞，大往小来。",
    tuanYue:"否之匪人，不利君子贞，大往小来，则是天地不交而万物不通也，上下不交而天下无邦也。",
    xiangYue:"天地不交，否。君子以俭德辟难，不可荣以禄。",
    baihua:"天地之气不相交通，万物闭塞不通。象征时运不济、闭塞之时，宜韬光养晦。",
    yaoCi:['初六：拔茅茹以其汇，贞吉亨。','六二：包承，小人吉，大人否亨。','六三：包羞。','九四：有命无咎，畴离祉。','九五：休否，大人吉，其亡其亡，系于苞桑。','上九：倾否，先否后喜。'],
    fortune:{cai:'闭塞不通，守财为上',hun:'阴阳不交，暂不宜婚',ye:'事业受阻，韬光养晦',jian:'气血不畅，注意调理',xing:'道路不通，暂勿出行',song:'形势不利，宜避为上'}},
  {num:13, name:"同人", fullName:"天火同人", upper:"乾", lower:"离", symbol:"䷌",
    guaCi:"同人于野，亨，利涉大川，利君子贞。",
    tuanYue:"同人，柔得位得中而应乎乾，曰同人。文明以健，中正而应，君子正也。",
    xiangYue:"天与火，同人。君子以类族辨物。",
    baihua:"天与火同性向上，志同道合。象征与人和同共事，胸怀坦荡则大事可成。",
    yaoCi:['初九：同人于门，无咎。','六二：同人于宗，吝。','九三：伏戎于莽，升其高陵，三岁不兴。','九四：乘其墉，弗克攻，吉。','九五：同人先号咷而后笑，大师克相遇。','上九：同人于郊，无悔。'],
    fortune:{cai:'合伙求财，志同道合',hun:'志趣相投，佳偶天成',ye:'团队协作，共创大业',jian:'心情愉悦，身体康健',xing:'结伴出行，吉利顺畅',song:'众人相助，形势有利'}},
  {num:14, name:"大有", fullName:"火天大有", upper:"离", lower:"乾", symbol:"䷍",
    guaCi:"元亨。",
    tuanYue:"大有，柔得尊位大中，而上下应之，曰大有。其德刚健而文明，应乎天而时行，是以元亨。",
    xiangYue:"火在天上，大有。君子以遏恶扬善，顺天休命。",
    baihua:"火在天上，光照万物，象征丰收富有。应遏制邪恶、弘扬善行，顺应天命。",
    yaoCi:['初九：无交害，匪咎，艰则无咎。','九二：大车以载，有攸往，无咎。','九三：公用亨于天子，小人弗克。','九四：匪其彭，无咎。','六五：厥孚交如，威如，吉。','上九：自天佑之，吉无不利。'],
    fortune:{cai:'大利求财，财运极旺',hun:'门当户对，美满良缘',ye:'事业兴旺，如日中天',jian:'体魄强健，精力旺盛',xing:'出行大吉，万事顺利',song:'正义在手，必然胜诉'}},
  {num:15, name:"谦", fullName:"地山谦", upper:"坤", lower:"艮", symbol:"䷎",
    guaCi:"亨，君子有终。",
    tuanYue:"谦亨，天道下济而光明，地道卑而上行。天道亏盈而益谦，地道变盈而流谦，鬼神害盈而福谦，人道恶盈而好谦。",
    xiangYue:"地中有山，谦。君子以裒多益寡，称物平施。",
    baihua:"高山隐于地下，有才而不自矜。谦虚使人进步，天地鬼神皆护佑谦逊之人。",
    yaoCi:['初六：谦谦君子，用涉大川，吉。','六二：鸣谦，贞吉。','九三：劳谦，君子有终，吉。','六四：无不利，撝谦。','六五：不富以其邻，利用侵伐，无不利。','上六：鸣谦，利用行师征邑国。'],
    fortune:{cai:'谦让得财，和气生财',hun:'谦恭有礼，感情顺利',ye:'谦虚谨慎，稳步上升',jian:'平和心态，身心安康',xing:'谦让于人，出行吉利',song:'退让一步，化解纷争'}},
  {num:16, name:"豫", fullName:"雷地豫", upper:"震", lower:"坤", symbol:"䷏",
    guaCi:"利建侯行师。",
    tuanYue:"豫，刚应而志行，顺以动，豫。豫顺以动，故天地如之，而况建侯行师乎？",
    xiangYue:"雷出地奋，豫。先王以作乐崇德，殷荐之上帝，以配祖考。",
    baihua:"春雷破地而出，万物欣然。象征顺时而动、安乐之象，宜趁势建立功业。",
    yaoCi:['初六：鸣豫，凶。','六二：介于石，不终日，贞吉。','六三：盱豫，悔，迟有悔。','九四：由豫，大有得，勿疑朋盍簪。','六五：贞疾，恒不死。','上六：冥豫，成有渝，无咎。'],
    fortune:{cai:'乘势而上，利于求财',hun:'愉悦和谐，婚姻可成',ye:'顺势而为，建功立业',jian:'心情愉悦，但防纵乐',xing:'出行顺利，喜气洋洋',song:'顺势而解，不宜久争'}},
  {num:17, name:"随", fullName:"泽雷随", upper:"兑", lower:"震", symbol:"䷐",
    guaCi:"元亨利贞，无咎。",
    tuanYue:"随，刚来而下柔，动而说，随。大亨贞无咎，而天下随时，随时之义大矣哉！",
    xiangYue:"泽中有雷，随。君子以向晦入宴息。",
    baihua:"泽中雷伏，顺时而动。随顺天时，因势利导，灵活应变则万事亨通。",
    yaoCi:['初九：官有渝，贞吉，出门交有功。','六二：系小子，失丈夫。','六三：系丈夫，失小子，随有求得，利居贞。','九四：随有获，贞凶，有孚在道以明，何咎。','九五：孚于嘉，吉。','上六：拘系之，乃从维之，王用亨于西山。'],
    fortune:{cai:'随机应变，财运可得',hun:'随缘随份，婚姻顺遂',ye:'顺势而为，灵活变通',jian:'随时调养，顺应节气',xing:'随遇而安，出行平安',song:'随和处事，不宜争讼'}},
  {num:18, name:"蛊", fullName:"山风蛊", upper:"艮", lower:"巽", symbol:"䷑",
    guaCi:"元亨，利涉大川，先甲三日，后甲三日。",
    tuanYue:"蛊，刚上而柔下，巽而止，蛊。蛊元亨而天下治也，利涉大川，往有事也。",
    xiangYue:"山下有风，蛊。君子以振民育德。",
    baihua:"山下有风，积弊成蛊。需整治旧弊、革故鼎新，审慎行事方能大亨。",
    yaoCi:['初六：干父之蛊，有子，考无咎，厉终吉。','九二：干母之蛊，不可贞。','九三：干父之蛊，小有悔，无大咎。','六四：裕父之蛊，往见吝。','六五：干父之蛊，用誉。','上九：不事王侯，高尚其事。'],
    fortune:{cai:'整顿旧务，可获新财',hun:'需要修正，方得良缘',ye:'革故鼎新，事业可成',jian:'调理旧疾，焕发新生',xing:'整装出发，先做准备',song:'清理纠纷，拨乱反正'}},
  {num:19, name:"临", fullName:"地泽临", upper:"坤", lower:"兑", symbol:"䷒",
    guaCi:"元亨利贞，至于八月有凶。",
    tuanYue:"临，刚浸而长，说而顺，刚中而应，大亨以正，天之道也。至于八月有凶，消不久也。",
    xiangYue:"泽上有地，临。君子以教思无穷，容保民无疆。",
    baihua:"地临泽上，阳气渐长。亲临督导，事业上升期，但盛极必衰，宜居安思危。",
    yaoCi:['初九：咸临，贞吉。','九二：咸临，吉，无不利。','六三：甘临，无攸利，既忧之，无咎。','六四：至临，无咎。','六五：知临，大君之宜，吉。','上六：敦临，吉，无咎。'],
    fortune:{cai:'财运上升，把握时机',hun:'亲近有缘，婚姻可成',ye:'亲力亲为，事业兴旺',jian:'阳气渐盛，身体转好',xing:'亲临其境，出行有利',song:'亲自处理，可获胜诉'}},
  {num:20, name:"观", fullName:"风地观", upper:"巽", lower:"坤", symbol:"䷓",
    guaCi:"盥而不荐，有孚颙若。",
    tuanYue:"大观在上，顺而巽，中正以观天下。观天之神道，而四时不忒，圣人以神道设教，而天下服矣。",
    xiangYue:"风行地上，观。先王以省方观民设教。",
    baihua:"风行地上，无远弗观。审时度势，以诚敬之心观照内外，可化育四方。",
    yaoCi:['初六：童观，小人无咎，君子吝。','六二：窥观，利女贞。','六三：观我生，进退。','六四：观国之光，利用宾于王。','九五：观我生，君子无咎。','上九：观其生，君子无咎。'],
    fortune:{cai:'观望为宜，暂勿投资',hun:'静观其变，缘分未到',ye:'审时度势，伺机而动',jian:'静心观察，调养身心',xing:'观察形势，择时出行',song:'旁观静待，不宜出击'}},
  {num:21, name:"噬嗑", fullName:"火雷噬嗑", upper:"离", lower:"震", symbol:"䷔",
    guaCi:"亨，利用狱。",
    tuanYue:"颐中有物曰噬嗑，噬嗑而亨。刚柔分，动而明，雷电合而章。柔得中而上行，利用狱也。",
    xiangYue:"雷电，噬嗑。先王以明罚敕法。",
    baihua:"口中有物须咬合，雷电交作。象征刑狱决断、去除障碍，以明快之法解决阻碍。",
    yaoCi:['初九：屦校灭趾，无咎。','六二：噬肤灭鼻，无咎。','六三：噬腊肉，遇毒，小吝，无咎。','九四：噬乾胏，得金矢，利艰贞，吉。','六五：噬乾肉，得黄金，贞厉，无咎。','上九：何校灭耳，凶。'],
    fortune:{cai:'果断出手，清除障碍得财',hun:'去除阻碍，婚姻可成',ye:'明快决断，扫除障碍',jian:'去除病根，果断治疗',xing:'排除万难，毅然前行',song:'诉讼有利，明辨是非'}},
  {num:22, name:"贲", fullName:"山火贲", upper:"艮", lower:"离", symbol:"䷕",
    guaCi:"亨，小利有攸往。",
    tuanYue:"贲亨，柔来而文刚，故亨。分刚上而文柔，故小利有攸往。观乎人文以化成天下。",
    xiangYue:"山下有火，贲。君子以明庶政，无敢折狱。",
    baihua:"山下有火，文采焕然。文饰美化但不可过度浮华，内在充实更重要，小事可成。",
    yaoCi:['初九：贲其趾，舍车而徒。','六二：贲其须。','九三：贲如濡如，永贞吉。','六四：贲如皤如，白马翰如，匪寇婚媾。','六五：贲于丘园，束帛戋戋，吝，终吉。','上九：白贲，无咎。'],
    fortune:{cai:'外表光鲜，实利有限',hun:'注重外表，内心真诚为要',ye:'文饰有余，实质为先',jian:'外表健康，需注意内调',xing:'整装出行，小事顺利',song:'注重形式，小事可解'}},
  {num:23, name:"剥", fullName:"山地剥", upper:"艮", lower:"坤", symbol:"䷖",
    guaCi:"不利有攸往。",
    tuanYue:"剥，剥也，柔变刚也。不利有攸往，小人长也。顺而止之，观象也。",
    xiangYue:"山附于地，剥。上以厚下安宅。",
    baihua:"山附于地，根基剥落。阴盛阳衰，宜安守本分、厚植根基，不宜妄动。",
    yaoCi:['初六：剥床以足，蔑贞凶。','六二：剥床以辨，蔑贞凶。','六三：剥之，无咎。','六四：剥床以肤，凶。','六五：贯鱼，以宫人宠，无不利。','上九：硕果不食，君子得舆，小人剥庐。'],
    fortune:{cai:'财运衰退，宜守不宜进',hun:'感情剥落，暂不宜婚',ye:'事业受阻，以退为进',jian:'身体虚弱，需要调养',xing:'不宜远行，安守为吉',song:'形势不利，不宜诉讼'}},
  {num:24, name:"复", fullName:"地雷复", upper:"坤", lower:"震", symbol:"䷗",
    guaCi:"亨，出入无疾，朋来无咎，反复其道，七日来复，利有攸往。",
    tuanYue:"复亨，刚反，动而以顺行，是以出入无疾，朋来无咎。反复其道，七日来复，天行也。",
    xiangYue:"雷在地中，复。先王以至日闭关，商旅不行，后不省方。",
    baihua:"一阳来复，春回大地。经历低谷后阳气重新萌生，否极泰来之兆，宜把握新生机遇。",
    yaoCi:['初九：不远复，无祗悔，元吉。','六二：休复，吉。','六三：频复，厉，无咎。','六四：中行独复。','六五：敦复，无悔。','上六：迷复，凶，有灾眚。'],
    fortune:{cai:'财运回升，否极泰来',hun:'旧情复燃，或遇新缘',ye:'事业复苏，重新起步',jian:'身体恢复，渐入佳境',xing:'出行渐利，回归之象',song:'反复周折，终可和解'}},
  {num:25, name:"无妄", fullName:"天雷无妄", upper:"乾", lower:"震", symbol:"䷘",
    guaCi:"元亨利贞，其匪正有眚，不利有攸往。",
    tuanYue:"无妄，刚自外来而为主于内，动而健，刚中而应，大亨以正，天之命也。",
    xiangYue:"天下雷行，物与无妄。先王以茂对时育万物。",
    baihua:"天下雷动，万物纯真。顺应自然之道，不妄为则亨通；若有邪念妄动，则有灾咎。",
    yaoCi:['初九：无妄，往吉。','六二：不耕获，不菑畲，则利有攸往。','六三：无妄之灾，或系之牛，行人之得，邑人之灾。','九四：可贞，无咎。','九五：无妄之疾，勿药有喜。','上九：无妄，行有眚，无攸利。'],
    fortune:{cai:'顺其自然，财运可期',hun:'真诚相待，婚缘可成',ye:'踏实本分，事业顺遂',jian:'顺应自然，无病则安',xing:'诚心出行，平安吉利',song:'切勿妄动，避免争讼'}},
  {num:26, name:"大畜", fullName:"山天大畜", upper:"艮", lower:"乾", symbol:"䷙",
    guaCi:"利贞，不家食吉，利涉大川。",
    tuanYue:"大畜，刚健笃实辉光，日新其德。刚上而尚贤，能止健，大正也。",
    xiangYue:"天在山中，大畜。君子以多识前言往行，以畜其德。",
    baihua:"高山藏天，蕴积深厚。广聚贤才、积蓄德行，时机成熟则大有作为。",
    yaoCi:['初九：有厉，利已。','九二：舆说輹。','九三：良马逐，利艰贞，曰闲舆卫，利有攸往。','六四：童牛之牿，元吉。','六五：豮豕之牙，吉。','上九：何天之衢，亨。'],
    fortune:{cai:'积聚财富，厚积薄发',hun:'蓄势待发，缘分将至',ye:'积累经验，厚德载物',jian:'注重养生，积蓄精气',xing:'蓄力待时，出行宜缓',song:'积累证据，据理力争'}},
  {num:27, name:"颐", fullName:"山雷颐", upper:"艮", lower:"震", symbol:"䷚",
    guaCi:"贞吉，观颐，自求口实。",
    tuanYue:"颐贞吉，养正则吉也。观颐，观其所养也。自求口实，观其自养也。",
    xiangYue:"山下有雷，颐。君子以慎言语，节饮食。",
    baihua:"山下雷鸣，象颐口养身。言语饮食需慎重，养正养德方获吉。",
    yaoCi:['初九：舍尔灵龟，观我朵颐，凶。','六二：颠颐，拂经，于丘颐，征凶。','六三：拂颐，贞凶，十年勿用，无攸利。','六四：颠颐，吉，虎视耽耽，其欲逐逐，无咎。','六五：拂经，居贞吉，不可涉大川。','上九：由颐，厉吉，利涉大川。'],
    fortune:{cai:'节用蓄财，量入为出',hun:'滋养情感，相互扶持',ye:'厚积薄发，言行谨慎',jian:'节制饮食，保养身体',xing:'谨慎出行，量力而为',song:'慎言守正，不宜妄争'}},
  {num:28, name:"大过", fullName:"泽风大过", upper:"兑", lower:"巽", symbol:"䷛",
    guaCi:"栋桡，利有攸往，亨。",
    tuanYue:"大过，大者过也。栋桡，本末弱也。刚过而中，巽而说行，利有攸往，乃亨。",
    xiangYue:"泽灭木，大过。君子以独立不惧，遁世无闷。",
    baihua:"大水漫过木梁，阳刚过盛，须防折断。宜独立担当，临危不惧，果断行动方可亨通。",
    yaoCi:['初六：藉用白茅，无咎。','九二：枯杨生稊，老夫得其女妻，无不利。','九三：栋桡，凶。','九四：栋隆，吉，有它吝。','九五：枯杨生华，老妇得其士夫，无咎无誉。','上六：过涉灭顶，凶，无咎。'],
    fortune:{cai:'防止过度，量力经营',hun:'切勿过激，宜平稳推进',ye:'大胆承担，防过犹不及',jian:'防止过劳，注意调养',xing:'不宜冒险，量力出行',song:'过刚则折，宜和解为上'}},
  {num:29, name:"坎", fullName:"坎为水", upper:"坎", lower:"坎", symbol:"䷜",
    guaCi:"习坎，有孚，维心亨，行有尚。",
    tuanYue:"习坎，重险也。水流而不盈，行险而不失其信，维心亨，乃以刚中也。",
    xiangYue:"水洊至，习坎。君子以常德行，习教事。",
    baihua:"水流连续险阻之中，百折不挠。身处困境仍须坚守诚信，终能穿越险难而获吉。",
    yaoCi:['初六：习坎，入于坎窞，凶。','九二：坎有险，求小得。','六三：来之坎坎，险且枕，入于坎窞，勿用。','六四：樽酒簋贰，用缶，纳约自牖，终无咎。','九五：坎不盈，祗既平，无咎。','上六：系用徽纆，寘于丛棘，三岁不得，凶。'],
    fortune:{cai:'险中求财，谨慎为要',hun:'感情多波折，需坚守诚信',ye:'困难重重，坚持则有成',jian:'防水防湿，注意安全',xing:'道路有险，谨慎出行',song:'陷入纷争，宜求和解'}},
  {num:30, name:"离", fullName:"离为火", upper:"离", lower:"离", symbol:"䷝",
    guaCi:"利贞，亨，畜牝牛，吉。",
    tuanYue:"离，丽也。日月丽乎天，百谷草木丽乎土。重明以丽乎正，乃化成天下。",
    xiangYue:"明两作，离。大人以继明照于四方。",
    baihua:"两火相叠，光明照耀。附丽于正道，文明昌盛；柔顺居中则亨通。",
    yaoCi:['初九：履错然，敬之，无咎。','六二：黄离，元吉。','九三：日昃之离，不鼓缶而歌，则大耋之嗟，凶。','九四：突如其来如，焚如，死如，弃如。','六五：出涕沱若，戚嗟若，吉。','上九：王用出征，有嘉折首，获匪其丑，无咎。'],
    fortune:{cai:'光明正大，财运亨通',hun:'两情相悦，婚姻光明',ye:'才华显露，事业光辉',jian:'注意心火，防燥热症',xing:'光明在前，出行顺利',song:'理直气壮，光明正大'}},
  {num:31, name:"咸", fullName:"泽山咸", upper:"兑", lower:"艮", symbol:"䷞",
    guaCi:"亨，利贞，取女吉。",
    tuanYue:"咸，感也。柔上而刚下，二气感应以相与，止而说，男下女，是以亨利贞取女吉也。",
    xiangYue:"山上有泽，咸。君子以虚受人。",
    baihua:"山上有泽，相互感应。男女阴阳感应相交，虚心包容，感动人心则万事亨通。",
    yaoCi:['初六：咸其拇。','六二：咸其腓，凶，居吉。','九三：咸其股，执其随，往吝。','九四：贞吉悔亡，憧憧往来，朋从尔思。','九五：咸其脢，无悔。','上六：咸其辅颊舌。'],
    fortune:{cai:'感应而动，财缘自来',hun:'男女相感，良缘天成',ye:'以诚感人，合作顺遂',jian:'身心相感，调和为宜',xing:'感召而行，出行吉利',song:'以情感化，息争化怨'}},
  {num:32, name:"恒", fullName:"雷风恒", upper:"震", lower:"巽", symbol:"䷟",
    guaCi:"亨，无咎，利贞，利有攸往。",
    tuanYue:"恒，久也。刚上而柔下，雷风相与，巽而动，刚柔皆应，恒。",
    xiangYue:"雷风，恒。君子以立不易方。",
    baihua:"雷风相随，持久不变。恒久坚持正道方能亨通，事业婚姻皆需持之以恒。",
    yaoCi:['初六：浚恒，贞凶，无攸利。','九二：悔亡。','九三：不恒其德，或承之羞，贞吝。','九四：田无禽。','六五：恒其德，贞，妇人吉，夫子凶。','上六：振恒，凶。'],
    fortune:{cai:'持之以恒，财运稳定',hun:'忠贞不渝，婚姻长久',ye:'坚持不懈，事业有成',jian:'规律作息，健康持久',xing:'按部就班，平安出行',song:'坚守立场，持久维权'}},
  {num:33, name:"遁", fullName:"天山遁", upper:"乾", lower:"艮", symbol:"䷠",
    guaCi:"亨，小利贞。",
    tuanYue:"遁亨，遁而亨也。刚当位而应，与时行也。小利贞，浸而长也。遁之时义大矣哉！",
    xiangYue:"天下有山，遁。君子以远小人，不恶而严。",
    baihua:"天下有山，隐退之象。识时务而退避，非消极逃避，乃明哲保身之智慧。",
    yaoCi:['初六：遁尾，厉，勿用有攸往。','六二：执之用黄牛之革，莫之胜说。','九三：系遁，有疾厉，畜臣妾吉。','九四：好遁，君子吉，小人否。','九五：嘉遁，贞吉。','上九：肥遁，无不利。'],
    fortune:{cai:'宜保守理财，暂避风头',hun:'暂时退让，静候时机',ye:'以退为进，韬光养晦',jian:'远离喧嚣，静养为宜',xing:'暂缓出行，避而远之',song:'退一步海阔天空'}},
  {num:34, name:"大壮", fullName:"雷天大壮", upper:"震", lower:"乾", symbol:"䷡",
    guaCi:"利贞。",
    tuanYue:"大壮，大者壮也。刚以动，故壮。大壮利贞，大者正也。正大而天地之情可见矣！",
    xiangYue:"雷在天上，大壮。君子以非礼弗履。",
    baihua:"雷在天上，声势浩大。阳刚盛壮之象，力量充沛但须守正道，过刚易折。",
    yaoCi:['初九：壮于趾，征凶，有孚。','九二：贞吉。','九三：小人用壮，君子用罔，贞厉，羝羊触藩，羸其角。','九四：贞吉悔亡，藩决不羸，壮于大舆之輹。','六五：丧羊于易，无悔。','上六：羝羊触藩，不能退不能遂，无攸利，艰则吉。'],
    fortune:{cai:'财运旺盛，但防过激',hun:'阳刚过盛，需柔和处之',ye:'事业强劲，守正则吉',jian:'精力充沛，防止过劳',xing:'出行有力，但勿冒进',song:'气势占优，但宜守礼'}},
  {num:35, name:"晋", fullName:"火地晋", upper:"离", lower:"坤", symbol:"䷢",
    guaCi:"康侯用锡马蕃庶，昼日三接。",
    tuanYue:"晋，进也。明出地上，顺而丽乎大明，柔进而上行，是以康侯用锡马蕃庶，昼日三接也。",
    xiangYue:"明出地上，晋。君子以自昭明德。",
    baihua:"太阳升出地面，光明普照。象征晋升进取，才华得到赏识，事业蒸蒸日上。",
    yaoCi:['初六：晋如摧如，贞吉，罔孚裕，无咎。','六二：晋如愁如，贞吉，受兹介福于其王母。','六三：众允，悔亡。','九四：晋如鼫鼠，贞厉。','六五：悔亡，失得勿恤，往吉，无不利。','上九：晋其角，维用伐邑，厉吉无咎，贞吝。'],
    fortune:{cai:'财运上升，晋升有望',hun:'感情进展，婚姻光明',ye:'步步高升，前途光明',jian:'身体向好，精神焕发',xing:'出行大吉，前路光明',song:'形势有利，可以进取'}},
  {num:36, name:"明夷", fullName:"地火明夷", upper:"坤", lower:"离", symbol:"䷣",
    guaCi:"利艰贞。",
    tuanYue:"明入地中，明夷。内文明而外柔顺，以蒙大难，文王以之。利艰贞，晦其明也。",
    xiangYue:"明入地中，明夷。君子以莅众用晦而明。",
    baihua:"光明隐入地下，才华被压抑。处暗昧之时，宜韬光养晦，坚守正道以待天明。",
    yaoCi:['初九：明夷于飞，垂其翼，君子于行，三日不食，有攸往，主人有言。','六二：明夷，夷于左股，用拯马壮，吉。','九三：明夷于南狩，得其大首，不可疾贞。','六四：入于左腹，获明夷之心，于出门庭。','六五：箕子之明夷，利贞。','上六：不明晦，初登于天，后入于地。'],
    fortune:{cai:'财运暗淡，守成为上',hun:'感情受阻，需耐心等待',ye:'才华被压，韬光养晦',jian:'注意眼疾，暗中保养',xing:'暂勿远行，守暗待明',song:'形势不利，忍耐为先'}},
  {num:37, name:"家人", fullName:"风火家人", upper:"巽", lower:"离", symbol:"䷤",
    guaCi:"利女贞。",
    tuanYue:"家人，女正位乎内，男正位乎外，男女正，天地之大义也。家人有严君焉，父母之谓也。",
    xiangYue:"风自火出，家人。君子以言有物而行有恒。",
    baihua:"风从火出，温暖家庭。治家以正、各安其位，言行一致则家道兴旺。",
    yaoCi:['初九：闲有家，悔亡。','六二：无攸遂，在中馈，贞吉。','九三：家人嗃嗃，悔厉吉，妇子嘻嘻，终吝。','六四：富家，大吉。','九五：王假有家，勿恤，吉。','上九：有孚威如，终吉。'],
    fortune:{cai:'家庭理财，稳健增长',hun:'家庭和睦，婚姻美满',ye:'治家有方，事业稳固',jian:'家人和气，身心安康',xing:'归家为吉，出行平稳',song:'家事宜和，不宜外扬'}},
  {num:38, name:"睽", fullName:"火泽睽", upper:"离", lower:"兑", symbol:"䷥",
    guaCi:"小事吉。",
    tuanYue:"睽，火动而上，泽动而下，二女同居其志不同行。说而丽乎明，柔进而上行，得中而应乎刚，是以小事吉。",
    xiangYue:"上火下泽，睽。君子以同而异。",
    baihua:"火向上泽向下，相违相背。意见分歧之时，求同存异，小事可成，大事宜缓。",
    yaoCi:['初九：悔亡，丧马勿逐自复，见恶人无咎。','九二：遇主于巷，无咎。','六三：见舆曳，其牛掣，其人天且劓，无初有终。','九四：睽孤，遇元夫，交孚，厉无咎。','六五：悔亡，厥宗噬肤，往何咎。','上九：睽孤见豕负涂，载鬼一车，先张之弧后说之弧，匪寇婚媾，往遇雨则吉。'],
    fortune:{cai:'分歧中求财，小利可得',hun:'意见不合，需互相理解',ye:'合作有隙，小事可成',jian:'心身不协，宜调和',xing:'出行有阻，小心前行',song:'各执己见，小事可了'}},
  {num:39, name:"蹇", fullName:"水山蹇", upper:"坎", lower:"艮", symbol:"䷦",
    guaCi:"利西南，不利东北，利见大人，贞吉。",
    tuanYue:"蹇，难也，险在前也。见险而能止，知矣哉！蹇利西南，往得中也。不利东北，其道穷也。利见大人，往有功也。",
    xiangYue:"山上有水，蹇。君子以反身修德。",
    baihua:"山上有水，行路艰难。前有险阻，宜反省自身、修养德行，求助贤人方可度过难关。",
    yaoCi:['初六：往蹇来誉。','六二：王臣蹇蹇，匪躬之故。','九三：往蹇来反。','六四：往蹇来连。','九五：大蹇朋来。','上六：往蹇来硕，吉，利见大人。'],
    fortune:{cai:'求财艰难，宜向西南',hun:'感情波折，需贵人相助',ye:'事业遇阻，反身修德',jian:'身体欠佳，宜求良医',xing:'前路多阻，不宜东北',song:'诉讼困难，宜求调解'}},
  {num:40, name:"解", fullName:"雷水解", upper:"震", lower:"坎", symbol:"䷧",
    guaCi:"利西南，无所往，其来复吉，有攸往，夙吉。",
    tuanYue:"解，险以动，动而免乎险，解。解利西南，往得众也。其来复吉，乃得中也。有攸往夙吉，往有功也。",
    xiangYue:"雷雨作，解。君子以赦过宥罪。",
    baihua:"雷雨交作，万物解冻。困难解除、危机化解之象，宜宽以待人，迅速把握解困之机。",
    yaoCi:['初六：无咎。','九二：田获三狐，得黄矢，贞吉。','六三：负且乘，致寇至，贞吝。','九四：解而拇，朋至斯孚。','六五：君子维有解，吉，有孚于小人。','上六：公用射隼于高墉之上，获之，无不利。'],
    fortune:{cai:'困境化解，财运回升',hun:'误会消除，感情解冻',ye:'障碍清除，事业转机',jian:'疾病渐愈，身体转好',xing:'出行吉利，利向西南',song:'纠纷化解，官司可了'}},
  {num:41, name:"损", fullName:"山泽损", upper:"艮", lower:"兑", symbol:"䷨",
    guaCi:"有孚，元吉，无咎可贞，利有攸往。曷之用？二簋可用享。",
    tuanYue:"损，损下益上，其道上行。损而有孚，元吉，无咎可贞，利有攸往。",
    xiangYue:"山下有泽，损。君子以惩忿窒欲。",
    baihua:"山下有泽，减损自身以奉上。克制怒气欲望，先损后益，诚心付出终有回报。",
    yaoCi:['初九：已事遄往，无咎，酌损之。','九二：利贞，征凶，弗损益之。','六三：三人行则损一人，一人行则得其友。','六四：损其疾，使遄有喜，无咎。','六五：或益之十朋之龟，弗克违，元吉。','上九：弗损益之，无咎，贞吉，利有攸往，得臣无家。'],
    fortune:{cai:'先舍后得，以退为进',hun:'适当让步，感情升温',ye:'减少浮华，充实内涵',jian:'节制欲望，身心健康',xing:'轻装出行，利于远方',song:'适当让步，可得和解'}},
  {num:42, name:"益", fullName:"风雷益", upper:"巽", lower:"震", symbol:"䷩",
    guaCi:"利有攸往，利涉大川。",
    tuanYue:"益，损上益下，民说无疆，自上下下，其道大光。利有攸往，中正有庆。利涉大川，木道乃行。",
    xiangYue:"风雷，益。君子以见善则迁，有过则改。",
    baihua:"风雷交助，互益互长。损上益下、惠及民众之象，宜大胆进取、革新改过。",
    yaoCi:['初九：利用为大作，元吉，无咎。','六二：或益之十朋之龟，弗克违，永贞吉，王用享于帝，吉。','六三：益之用凶事，无咎，有孚中行，告公用圭。','六四：中行告公从，利用为依迁国。','九五：有孚惠心，勿问元吉，有孚惠我德。','上九：莫益之，或击之，立心勿恒，凶。'],
    fortune:{cai:'财运增益，利于投资',hun:'互相扶持，婚姻有益',ye:'事业增长，大胆进取',jian:'身体日益好转',xing:'出行大吉，涉险无碍',song:'形势有利，主动出击'}},
  {num:43, name:"夬", fullName:"泽天夬", upper:"兑", lower:"乾", symbol:"䷪",
    guaCi:"扬于王庭，孚号有厉，告自邑，不利即戎，利有攸往。",
    tuanYue:"夬，决也，刚决柔也。健而说，决而和。扬于王庭，柔乘五刚也。孚号有厉，其危乃光也。",
    xiangYue:"泽上于天，夬。君子以施禄及下，居德则忌。",
    baihua:"泽水升天，决堤而出。以刚决柔、果断除害之象，但须光明正大、以德服人。",
    yaoCi:['初九：壮于前趾，往不胜为咎。','九二：惕号，莫夜有戎，勿恤。','九三：壮于頄，有凶，君子夬夬独行遇雨若濡有愠，无咎。','九四：臀无肤，其行次且，牵羊悔亡，闻言不信。','九五：苋陆夬夬，中行无咎。','上六：无号，终有凶。'],
    fortune:{cai:'果断出手，利于决断',hun:'果断抉择，勿犹豫',ye:'果断处事，革除弊端',jian:'果断治疗，不可拖延',xing:'果断出行，利于前进',song:'果断决断，可获胜诉'}},
  {num:44, name:"姤", fullName:"天风姤", upper:"乾", lower:"巽", symbol:"䷫",
    guaCi:"女壮，勿用取女。",
    tuanYue:"姤，遇也，柔遇刚也。勿用取女，不可与长也。天地相遇，品物咸章也。",
    xiangYue:"天下有风，姤。后以施命诰四方。",
    baihua:"天下有风，无处不至。不期而遇之象，但此遇未必可靠，须谨慎辨别，防止被惑。",
    yaoCi:['初六：系于金柅，贞吉，有攸往，见凶，羸豕孚蹢躅。','九二：包有鱼，无咎，不利宾。','九三：臀无肤，其行次且，厉，无大咎。','九四：包无鱼，起凶。','九五：以杞包瓜，含章，有陨自天。','上九：姤其角，吝，无咎。'],
    fortune:{cai:'不期而遇，但须辨真伪',hun:'邂逅虽美，须审慎对待',ye:'机遇突来，谨慎把握',jian:'注意突发状况',xing:'途中有遇，谨慎交往',song:'意外事端，防止纠纷'}},
  {num:45, name:"萃", fullName:"泽地萃", upper:"兑", lower:"坤", symbol:"䷬",
    guaCi:"亨，王假有庙，利见大人，亨利贞，用大牲吉，利有攸往。",
    tuanYue:"萃，聚也。顺以说，刚中而应，故聚也。王假有庙，致孝享也。利见大人亨，聚以正也。",
    xiangYue:"泽上于地，萃。君子以除戎器，戒不虞。",
    baihua:"泽聚于地，万物汇集。众人聚合、人才荟萃之象，宜以诚心凝聚人心，居安思危。",
    yaoCi:['初六：有孚不终，乃乱乃萃，若号，一握为笑，勿恤，往无咎。','六二：引吉，无咎，孚乃利用禴。','六三：萃如嗟如，无攸利，往无咎，小吝。','九四：大吉，无咎。','九五：萃有位，无咎，匪孚，元永贞，悔亡。','上六：赍咨涕洟，无咎。'],
    fortune:{cai:'聚财有方，广结善缘',hun:'众缘和合，婚姻可成',ye:'汇聚人才，事业兴旺',jian:'聚气养神，身体健康',xing:'结伴出行，平安吉利',song:'聚众之力，可解纷争'}},
  {num:46, name:"升", fullName:"地风升", upper:"坤", lower:"巽", symbol:"䷭",
    guaCi:"元亨，用见大人，勿恤，南征吉。",
    tuanYue:"柔以时升，巽而顺，刚中而应，是以大亨。用见大人勿恤，有庆也。南征吉，志行也。",
    xiangYue:"地中生木，升。君子以顺德，积小以高大。",
    baihua:"木从地中生长向上，步步升高。循序渐进、积少成多之象，宜稳步上升、积累成长。",
    yaoCi:['初六：允升，大吉。','九二：孚乃利用禴，无咎。','九三：升虚邑。','六四：王用亨于岐山，吉，无咎。','六五：贞吉，升阶。','上六：冥升，利于不息之贞。'],
    fortune:{cai:'财运上升，逐步增长',hun:'感情升温，步步深入',ye:'事业上升，步步高升',jian:'身体渐好，逐步恢复',xing:'南行大吉，步步顺利',song:'形势上升，可以进取'}},
  {num:47, name:"困", fullName:"泽水困", upper:"兑", lower:"坎", symbol:"䷮",
    guaCi:"亨，贞大人吉，无咎，有言不信。",
    tuanYue:"困，刚掩也。险以说，困而不失其所亨，其唯君子乎！贞大人吉，以刚中也。有言不信，尚口乃穷也。",
    xiangYue:"泽无水，困。君子以致命遂志。",
    baihua:"泽中无水，困顿之象。身处困境但不失志，以坚定意志和德行度过难关。",
    yaoCi:['初六：臀困于株木，入于幽谷，三岁不觌。','九二：困于酒食，朱绂方来，利用享祀，征凶，无咎。','六三：困于石，据于蒺藜，入于其宫，不见其妻，凶。','九四：来徐徐，困于金车，吝，有终。','九五：劓刖，困于赤绂，乃徐有说，利用祭祀。','上六：困于葛藟，于臲卼，曰动悔有悔，征吉。'],
    fortune:{cai:'财运困顿，宜守不宜进',hun:'感情受困，需耐心坚守',ye:'事业困难，坚持不放弃',jian:'身体欠佳，注意调养',xing:'出行受阻，暂宜不动',song:'陷于困境，言多无益'}},
  {num:48, name:"井", fullName:"水风井", upper:"坎", lower:"巽", symbol:"䷯",
    guaCi:"改邑不改井，无丧无得，往来井井，汔至亦未繘井，羸其瓶，凶。",
    tuanYue:"巽乎水而上水，井。井养而不穷也。改邑不改井，乃以刚中也。",
    xiangYue:"木上有水，井。君子以劳民劝相。",
    baihua:"木引水上行如井汲水。井养万物而不竭，象征恒久不变的根本和源泉，宜修身养德。",
    yaoCi:['初六：井泥不食，旧井无禽。','九二：井谷射鲋，瓮敝漏。','九三：井渫不食，为我心恻，可用汲，王明并受其福。','六四：井甃，无咎。','九五：井冽寒泉，食。','上六：井收勿幕，有孚元吉。'],
    fortune:{cai:'稳定之源，细水长流',hun:'不离不弃，婚姻稳固',ye:'扎根深处，事业长久',jian:'养生如井，源源不断',xing:'出行平稳，利于归来',song:'固守根本，可获公正'}},
  {num:49, name:"革", fullName:"泽火革", upper:"兑", lower:"离", symbol:"䷰",
    guaCi:"已日乃孚，元亨利贞，悔亡。",
    tuanYue:"革，水火相息，二女同居其志不相得曰革。已日乃孚，革而信之。文明以说，大亨以正，革而当，其悔乃亡。",
    xiangYue:"泽中有火，革。君子以治历明时。",
    baihua:"泽中有火，水火相克而变革。顺应时势、除旧布新之象，变革得当则大亨。",
    yaoCi:['初九：巩用黄牛之革。','六二：已日乃革之，征吉，无咎。','九三：征凶，贞厉，革言三就，有孚。','九四：悔亡，有孚改命，吉。','九五：大人虎变，未占有孚。','上六：君子豹变，小人革面，征凶，居贞吉。'],
    fortune:{cai:'变革求新，可获大利',hun:'感情变化，顺势而变',ye:'革故鼎新，事业转型',jian:'改变习惯，焕然一新',xing:'变更行程，反而有利',song:'情势变化，顺势而解'}},
  {num:50, name:"鼎", fullName:"火风鼎", upper:"离", lower:"巽", symbol:"䷱",
    guaCi:"元吉，亨。",
    tuanYue:"鼎，象也。以木巽火，亨饪也。圣人亨以享上帝，而大亨以养圣贤。巽而耳目聪明，柔进而上行，得中而应乎刚，是以元亨。",
    xiangYue:"木上有火，鼎。君子以正位凝命。",
    baihua:"木上燃火，烹饪养贤。鼎为重器，象征鼎新革故、文明教化，大吉大利之象。",
    yaoCi:['初六：鼎颠趾，利出否，得妾以其子，无咎。','九二：鼎有实，我仇有疾，不我能即，吉。','九三：鼎耳革，其行塞，雉膏不食，方雨亏悔，终吉。','九四：鼎折足，覆公餗，其形渥，凶。','六五：鼎黄耳金铉，利贞。','上九：鼎玉铉，大吉，无不利。'],
    fortune:{cai:'鼎新之运，财源广进',hun:'门当户对，婚姻美满',ye:'革新创业，前途光明',jian:'调养得法，身体强健',xing:'出行大吉，万事如意',song:'端正态度，可获胜诉'}},
  {num:51, name:"震", fullName:"震为雷", upper:"震", lower:"震", symbol:"䷲",
    guaCi:"亨，震来虩虩，笑言哑哑，震惊百里，不丧匕鬯。",
    tuanYue:"震亨，震来虩虩，恐致福也。笑言哑哑，后有则也。震惊百里，惊远而惧迩也。",
    xiangYue:"洊雷，震。君子以恐惧修省。",
    baihua:"雷声连连，震动四方。惊恐之后反得福，警醒自省则可化险为夷。",
    yaoCi:['初九：震来虩虩，后笑言哑哑，吉。','六二：震来厉，亿丧贝，跻于九陵，勿逐，七日得。','六三：震苏苏，震行无眚。','九四：震遂泥。','六五：震往来厉，亿无丧有事。','上六：震索索，视矍矍，征凶，震不于其躬于其邻，无咎，婚媾有言。'],
    fortune:{cai:'先惊后喜，财运波动',hun:'经历波折，终成眷属',ye:'震荡中崛起，化危为机',jian:'注意心脏，防受惊吓',xing:'旅途颠簸，终获平安',song:'突发变故，冷静应对'}},
  {num:52, name:"艮", fullName:"艮为山", upper:"艮", lower:"艮", symbol:"䷳",
    guaCi:"艮其背，不获其身，行其庭，不见其人，无咎。",
    tuanYue:"艮，止也。时止则止，时行则行，动静不失其时，其道光明。艮其止，止其所也。",
    xiangYue:"兼山，艮。君子以思不出其位。",
    baihua:"两山重叠，稳重安止。该止则止、知足常乐，安守本分、不妄动则无咎。",
    yaoCi:['初六：艮其趾，无咎，利永贞。','六二：艮其腓，不拯其随，其心不快。','九三：艮其限，列其夤，厉薰心。','六四：艮其身，无咎。','六五：艮其辅，言有序，悔亡。','上九：敦艮，吉。'],
    fortune:{cai:'安守本分，勿贪多求',hun:'安定心神，缘分自来',ye:'稳扎稳打，不宜冒进',jian:'静养休息，身心安宁',xing:'暂停出行，安守为吉',song:'止争息讼，以静制动'}},
  {num:53, name:"渐", fullName:"风山渐", upper:"巽", lower:"艮", symbol:"䷴",
    guaCi:"女归吉，利贞。",
    tuanYue:"渐之进也，女归吉也。进得位，往有功也。进以正，可以正邦也。",
    xiangYue:"山上有木，渐。君子以居贤德善俗。",
    baihua:"山上有木，渐渐生长。循序渐进、稳步前行之象，如女子出嫁般按礼而行则吉。",
    yaoCi:['初六：鸿渐于干，小子厉，有言，无咎。','六二：鸿渐于磐，饮食衎衎，吉。','九三：鸿渐于陆，夫征不复，妇孕不育，凶，利御寇。','六四：鸿渐于木，或得其桷，无咎。','九五：鸿渐于陵，妇三岁不孕，终莫之胜，吉。','上九：鸿渐于陆，其羽可用为仪，吉。'],
    fortune:{cai:'渐入佳境，稳步增长',hun:'循序渐进，婚姻可成',ye:'步步为营，事业稳升',jian:'逐步调养，渐渐恢复',xing:'稳步前行，出行顺利',song:'循序渐进，耐心处理'}},
  {num:54, name:"归妹", fullName:"雷泽归妹", upper:"震", lower:"兑", symbol:"䷵",
    guaCi:"征凶，无攸利。",
    tuanYue:"归妹，天地之大义也。天地不交而万物不兴，归妹人之终始也。说以动，所归妹也。征凶，位不当也。无攸利，柔乘刚也。",
    xiangYue:"泽上有雷，归妹。君子以永终知敝。",
    baihua:"泽上有雷，少女随雷而动。仓促行事、不循正道之象，宜谨慎行事，善始善终。",
    yaoCi:['初九：归妹以娣，跛能履，征吉。','九二：眇能视，利幽人之贞。','六三：归妹以须，反归以娣。','九四：归妹愆期，迟归有时。','六五：帝乙归妹，其君之袂不如其娣之袂良，月几望，吉。','上六：女承筐无实，士刲羊无血，无攸利。'],
    fortune:{cai:'仓促求财，恐有损失',hun:'婚姻仓促，须三思',ye:'不宜冒进，谨慎行事',jian:'注意妇科，调理为先',xing:'不宜远行，宜缓不宜急',song:'形势不利，不宜诉讼'}},
  {num:55, name:"丰", fullName:"雷火丰", upper:"震", lower:"离", symbol:"䷶",
    guaCi:"亨，王假之，勿忧，宜日中。",
    tuanYue:"丰，大也。明以动，故丰。王假之，尚大也。勿忧宜日中，宜照天下也。日中则昃，月盈则食，天地盈虚，与时消息。",
    xiangYue:"雷电皆至，丰。君子以折狱致刑。",
    baihua:"雷电交至，声势丰盛。盛大光明之象，但盛极必衰，宜在鼎盛时居安思危。",

// 八卦映射：二进制 -> 卦名
const trigramName = {
  '111':'乾','110':'兑','101':'离','100':'震',
  '011':'巽','010':'坎','001':'艮','000':'坤'
};

// 文王序 8×8 查找表 [下卦][上卦] -> 卦序号(1-64)
// 行=下卦(乾兑离震巽坎艮坤)，列=上卦(乾兑离震巽坎艮坤)
const hexagramLookup = [
  /*        乾 兑 离 震 巽 坎 艮 坤 */
  /* 乾 */ [ 1,43,14,34, 9, 5,26,11],
  /* 兑 */ [10,58,38,54,61,60,41,19],
  /* 离 */ [13,49,30,55,37,63,22,36],
  /* 震 */ [25,17,21,51,42, 3,27,24],
  /* 巽 */ [44,28,50,32,57,48,18,46],
  /* 坎 */ [ 6,47,64,40,59,29, 4, 7],
  /* 艮 */ [33,31,56,62,53,39,52,15],
  /* 坤 */ [12,45,35,16,20, 8,23, 2]
];

// 三画卦编码顺序（与查找表行列对应）
const trigramOrder = ['111','110','101','100','011','010','001','000'];

let currentYao = 0; // 当前爻数 0-5
let lines = [];     // 6爻结果 [6|7|8|9]
let isThrowing = false;

function throwCoins() {
  if (isThrowing) return;
  if (currentYao >= 6) return;
  isThrowing = true;

  const btn = document.getElementById('throwBtn');
  const hint = document.getElementById('hint');
  const progress = document.getElementById('progress');
  const resultEl = document.getElementById('result');

  btn.disabled = true;
  if (currentYao === 0) {
    resultEl.classList.remove('show');
    resultEl.style.display = 'none';
  }

  progress.textContent = `第 ${currentYao + 1} / 6 爻`;
  hint.textContent = '铜钱翻转中...';
  hint.style.animation = 'none';

  // 铜钱翻转动画
  const coins = [document.getElementById('coin0'), document.getElementById('coin1'), document.getElementById('coin2')];
  coins.forEach(c => c.classList.add('flipping'));

  // 随机结果：字=3(阳面), 背=2(阴面)
  const values = [0,0,0].map(() => Math.random() < 0.5 ? 3 : 2);
  const sum = values[0] + values[1] + values[2]; // 6=老阴, 7=少阳, 8=少阴, 9=老阳

  setTimeout(() => {
    coins.forEach((c, i) => {
      c.classList.remove('flipping');
      if (values[i] === 3) {
        c.classList.remove('result-yin');
        c.classList.add('result-yang');
      } else {
        c.classList.remove('result-yang');
        c.classList.add('result-yin');
      }
    });

    // 记录爻
    lines.push(sum);

    // 画爻线
    const isYang = (sum === 7 || sum === 9); // 阳爻
    const yaoLine = document.getElementById('yao' + currentYao);
    const yaoBar = document.getElementById('yaoBar' + currentYao);
    const yaoTypeEl = document.getElementById('yaoType' + currentYao);

    if (isYang) {
      yaoBar.className = 'yao-bar yang';
      yaoBar.innerHTML = '';
    } else {
      // 阴爻：两段短线 + 中间空隙
      yaoBar.className = 'yao-bar';
      yaoBar.style.cssText = 'display:flex;align-items:center;gap:0;background:none;';
      yaoBar.innerHTML = '<span style="display:inline-block;width:42px;height:6px;background:#c8a84e;border-radius:3px;"></span><span style="display:inline-block;width:12px;"></span><span style="display:inline-block;width:42px;height:6px;background:#c8a84e;border-radius:3px;"></span>';
    }

    const typeNames = {6:'老阴',7:'少阳',8:'少阴',9:'老阳'};
    yaoTypeEl.textContent = typeNames[sum];
    yaoLine.classList.add('visible');

    currentYao++;

    if (currentYao >= 6) {
      // 完成六爻，查找卦象
      hint.textContent = '卦象已成...';
      setTimeout(() => {
        const flash = document.createElement('div');
        flash.className = 'flash';
        document.body.appendChild(flash);
        setTimeout(() => flash.remove(), 600);

        const hexNum = findHexagram(lines);
        const gua = guas.find(g => g.num === hexNum);
        if (gua) {
          showResult(gua, lines);
        } else {
          hint.textContent = '卦象数据加载中...';
        }
        btn.textContent = '再 占 一 卦';
        btn.disabled = false;
        btn.onclick = resetOracle;
        hint.style.animation = 'pulse 2s ease-in-out infinite';
      }, 800);
    } else {
      progress.textContent = `第 ${currentYao + 1} / 6 爻`;
      hint.textContent = '点击铜钱 · 继续摇卦';
      hint.style.animation = 'pulse 2s ease-in-out infinite';
      btn.disabled = false;
    }

    isThrowing = false;
  }, 700);
}

function findHexagram(lines) {
  // 下卦=前3爻, 上卦=后3爻
  // 老阴(6)→阴, 少阳(7)→阳, 少阴(8)→阴, 老阳(9)→阳
  const toBit = v => (v === 7 || v === 9) ? '1' : '0';
  const lower = toBit(lines[0]) + toBit(lines[1]) + toBit(lines[2]);
  const upper = toBit(lines[3]) + toBit(lines[4]) + toBit(lines[5]);

  const row = trigramOrder.indexOf(lower);
  const col = trigramOrder.indexOf(upper);

  if (row === -1 || col === -1) return 1;
  return hexagramLookup[row][col];
}

function showResult(gua, lines) {
  const el = document.getElementById('result');
  const toBit = v => (v === 7 || v === 9) ? 1 : 0;
  const lower = '' + toBit(lines[0]) + toBit(lines[1]) + toBit(lines[2]);
  const upper = '' + toBit(lines[3]) + toBit(lines[4]) + toBit(lines[5]);

  // 构建六爻图HTML
  const yaoNames = ['初爻','二爻','三爻','四爻','五爻','上爻'];
  let hexDisplay = '';
  for (let i = 0; i < 6; i++) {
    const isYang = toBit(lines[i]) === 1;
    if (isYang) {
      hexDisplay += `<div class="hex-yao"><span class="hex-label">${yaoNames[i]}</span><span class="hex-bar yang"></span></div>`;
    } else {
      hexDisplay += `<div class="hex-yao"><span class="hex-label">${yaoNames[i]}</span><span class="hex-bar yin"></span><span class="hex-gap"></span><span class="hex-bar yin"></span></div>`;

  // 爻辞列表
  let yaoCiHtml = '';

  }

  el.innerHTML = `
    <div class="result-card">
      <div class="result-header">
        <div class="result-symbol">${gua.symbol || ''}</div>
        <div class="result-name">${gua.fullName}</div>

      </div>
      <div class="hexagram-display">${hexDisplay}</div>
      <div class="divider"></div>
      <div class="interpretation">
        <h3>卦 辞</h3>
        <p>${gua.guaCi}</p>
      </div>
      <div class="interpretation">
        <h3>彖 曰</h3>
        <p>${gua.tuanYue}</p>
      </div>
      <div class="interpretation">
        <h3>象 曰</h3>
        <p>${gua.xiangYue}</p>
      </div>
      <div class="interpretation">
        <h3>爻 辞</h3>
        ${yaoCiHtml}
      </div>
      <div class="interpretation">
        <h3>白话解读</h3>
        <p>${gua.baihua}</p>
      </div>
      <div class="divider"></div>
      <div class="interpretation">
        <h3>占卜建议</h3>
        <div class="detail-grid">
          <div class="detail-item">求财：<span>${gua.fortune.cai}</span></div>
          <div class="detail-item">婚姻：<span>${gua.fortune.hun}</span></div>
          <div class="detail-item">事业：<span>${gua.fortune.ye}</span></div>
          <div class="detail-item">健康：<span>${gua.fortune.jian}</span></div>
          <div class="detail-item">出行：<span>${gua.fortune.xing}</span></div>
          <div class="detail-item">诉讼：<span>${gua.fortune.song}</span></div>
        </div>
      </div>
    </div>
    <button class="btn-again" onclick="resetOracle()">再 占 一 卦</button>
  `;

  requestAnimationFrame(() => {
    el.style.display = 'block';
    requestAnimationFrame(() => {
      el.classList.add('show');
      el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });
}

function resetOracle() {
  currentYao = 0;
  lines = [];
  isThrowing = false;

  const btn = document.getElementById('throwBtn');
  const hint = document.getElementById('hint');
  const progress = document.getElementById('progress');
  const resultEl = document.getElementById('result');

  btn.textContent = '摇 卦';
  btn.disabled = false;
  btn.onclick = throwCoins;
  hint.textContent = '点击铜钱 · 诚心摇卦';
  hint.style.animation = 'pulse 2s ease-in-out infinite';
  progress.textContent = '';

  resultEl.classList.remove('show');
  setTimeout(() => { resultEl.style.display = 'none'; }, 800);

  // 重置爻线
  for (let i = 0; i < 6; i++) {
    const yaoLine = document.getElementById('yao' + i);
    const yaoBar = document.getElementById('yaoBar' + i);
    const yaoTypeEl = document.getElementById('yaoType' + i);
    yaoLine.classList.remove('visible');
    yaoBar.className = 'yao-bar yang';
    yaoBar.style.cssText = '';
    yaoBar.innerHTML = '';
    yaoTypeEl.textContent = '';
  }

  // 重置铜钱
  for (let i = 0; i < 3; i++) {
    const c = document.getElementById('coin' + i);
    c.classList.remove('result-yang', 'result-yin');
  }
}
</script>
